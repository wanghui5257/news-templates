<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>跨境电商新闻 Top 10 - {{DATE}} (Asia/Shanghai)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }
        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        header p {
            font-size: 1.1em;
            opacity: 0.9;
        }
        .legend {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.2);
            padding: 8px 16px;
            border-radius: 20px;
            color: white;
            font-size: 0.9em;
        }
        .legend-badge {
            font-size: 1.2em;
        }
        .section {
            background: white;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .section-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 3px solid #667eea;
        }
        .section-icon {
            font-size: 1.5em;
        }
        .section-title {
            font-size: 1.4em;
            color: #2d3436;
            font-weight: 700;
        }
        .news-item {
            padding: 16px 0;
            border-bottom: 1px solid #eee;
        }
        .news-item:last-child {
            border-bottom: none;
        }
        .news-title {
            font-size: 1.15em;
            color: #2d3436;
            margin-bottom: 8px;
            font-weight: 600;
        }
        .news-title a {
            color: #667eea;
            text-decoration: none;
            transition: color 0.3s ease;
        }
        .news-title a:hover {
            color: #764ba2;
            text-decoration: underline;
        }
        .news-meta {
            display: flex;
            gap: 15px;
            color: #636e72;
            font-size: 0.85em;
            margin-bottom: 8px;
        }
        .news-meta span {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .news-description {
            color: #636e72;
            line-height: 1.6;
            font-size: 0.95em;
        }
        .source-tag {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 15px;
            font-size: 0.8em;
            margin-right: 8px;
        }
        .source-official { background: #f1c40f; color: #2d3436; }
        .source-community { background: #3498db; color: white; }
        .source-media { background: #e74c3c; color: white; }
        .source-knowledge { background: #9b59b6; color: white; }
        footer {
            text-align: center;
            color: white;
            margin-top: 40px;
            opacity: 0.8;
            font-size: 0.9em;
        }
        .section-official { border-left: 5px solid #f1c40f; }
        .section-community { border-left: 5px solid #3498db; }
        .section-media { border-left: 5px solid #e74c3c; }
        .section-knowledge { border-left: 5px solid #9b59b6; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🛒 跨境电商新闻 Top 10</h1>
            <p>{{DATE}} (Asia/Shanghai) | {{TIME}} UTC</p>
        </header>
        
        <div class="legend">
            <div class="legend-item"><span class="legend-badge">🏛️</span><span>官方发布</span></div>
            <div class="legend-item"><span class="legend-badge">💬</span><span>社区讨论</span></div>
            <div class="legend-item"><span class="legend-badge">📰</span><span>行业媒体</span></div>
            <div class="legend-item"><span class="legend-badge">📚</span><span>教程分析</span></div>
        </div>
        
        <div class="section section-official">
            <div class="section-header">
                <span class="section-icon">🏛️</span>
                <h2 class="section-title">官方发布</h2>
            </div>
            {{NEWS_OFFICIAL}}
        </div>
        
        <div class="section section-community">
            <div class="section-header">
                <span class="section-icon">💬</span>
                <h2 class="section-title">社区讨论</h2>
            </div>
            {{NEWS_COMMUNITY}}
        </div>
        
        <div class="section section-media">
            <div class="section-header">
                <span class="section-icon">📰</span>
                <h2 class="section-title">行业媒体</h2>
            </div>
            {{NEWS_MEDIA}}
        </div>
        
        <div class="section section-knowledge">
            <div class="section-header">
                <span class="section-icon">📚</span>
                <h2 class="section-title">教程分析</h2>
            </div>
            {{NEWS_KNOWLEDGE}}
        </div>
        
        <footer>
            <p>HTML 页面由 Walt Wang 的 ai 机器人生成 | 每日早 8 点自动更新</p>
        </footer>
    </div>
</body>
</html>
